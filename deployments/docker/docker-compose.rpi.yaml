services:
  db:
    image: postgres:latest
    platform: linux/arm64
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wealth_warden}
    volumes:
      - db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wealth_warden}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth-warden

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealth-warden

  migrate:
    profiles: ["migrate"]
    build:
      context: ../..
      dockerfile: ./build/Dockerfile
      args:
        TARGETARCH: arm64
    platform: linux/arm64
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-wealth_warden}
      - POSTGRES_PORT=5432
    entrypoint: ["server"]
    command: ["migrate", "up"]
    volumes:
      - ../../logs:/app/logs
      - ../../pkg/config/override:/app/pkg/config/override:ro
      - ../../storage/migrations:/app/storage/migrations:ro
    networks:
      - wealth-warden

  server:
    build:
      context: ../..
      dockerfile: ./build/Dockerfile
      args:
        TARGETARCH: arm64
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-wealth_warden}
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - SESSION_REMEMBER_ME_TTL_HOURS=${SESSION_REMEMBER_ME_TTL_HOURS:-720}
      - SESSION_MAX_LIFETIME_HOURS=${SESSION_MAX_LIFETIME_HOURS:-2160}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-tempo:4317}
    volumes:
      - ../../logs:/app/logs
      - ../../pkg/config/override:/app/pkg/config/override:ro
      - ../../storage/mailer-templates:/app/storage/mailer-templates:ro
      - ../../storage/migrations:/app/storage/migrations:ro
    networks:
      - wealth-warden

  client:
    build:
      context: ../../
      dockerfile: ./build/Dockerfile.client
      args:
        TARGETARCH: arm64
    platform: linux/arm64
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5000:80"
    networks:
      - wealth-warden

volumes:
  db:
  redis:

networks:
  wealth-warden: