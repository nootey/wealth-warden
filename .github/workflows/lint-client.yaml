name: "Lint Client"

on:
  push:
    paths:
      - 'client/**'
    branches:
      - main
      - development
  pull_request:
    paths:
      - 'client/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-client:
    name: Lint Vue/TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linting
        run: pnpm run lint:check

      - name: Run Type Check
        run: pnpm run type-check