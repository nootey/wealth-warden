host: "127.0.0.1"
release: false
finance_api_base_url: "https://query1.finance.yahoo.com"

http_server:
  port: 2000
  request_timeout: 60

web_client:
  domain: "localhost"
  port: 5000

postgres:
  host: "localhost"
  user: "postgres"
  password: "postgres"
  port: 5432
  db: "wealth_warden"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

session:
  ttl_hours: 24
  remember_me_ttl_hours: 720   # 30d
  max_lifetime_hours: 2160     # 90d absolute cap, checked against created_at

cors:
  allowed_origins:
    - "http://localhost:5000"
    - "http://app:5000"
  wildcard_suffixes: []
  allowed_schemes: ["http"]

mailer:
  host: "smtp.email.com"
  port: 587
  username: "email@email.com"
  password: "aaaa bbbb cccc dddd"

seed:
  super_admin_email: "support@wealth.warden"
  super_admin_password: "password"
  member_user_email: ""
  member_user_password: ""

scheduler:
  concurrent_workers: 5
  immediate_jobs:
    - asset_price_sync
#    - asset_history_backfill
#    - balance_backfill
#    - templates
#    - savings_goal_fund

otel:
  service_name: "wealth-warden"
  otlp_endpoint: "localhost:4317"  # local dev (tempo port mapped to host)
# otlp_endpoint: "tempo:4317"      # prod / in-Docker (resolve via Docker network)

queue:
  workers: 1                          # concurrent claim-loop workers
  max_attempts: 5
  poll_interval_ms: 1000
  retry_initial_backoff_sec: 60
  retry_subsequent_backoff_sec: 120
  visibility_timeout_sec: 900         # reclaim jobs stuck in 'processing' after a crash (> longest job runtime)